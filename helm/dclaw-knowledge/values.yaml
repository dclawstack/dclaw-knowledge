replicaCount: 1

frontend:
  image:
    repository: dclaw-knowledge-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3053
  ingress:
    enabled: false

backend:
  image:
    repository: dclaw-knowledge-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8139
  env:
    KNOWLEDGE_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/dclaw_knowledge"

database:
  name: dclaw_knowledge
